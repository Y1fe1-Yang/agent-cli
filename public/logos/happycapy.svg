<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>
  <!-- Body/head: wide flat-topped shape characteristic of capybara -->
  <rect x='2' y='8' width='20' height='11' rx='4' fill='#cc785c'/>
  <!-- Flat top extension (capybara's boxy head) -->
  <rect x='3' y='6' width='15' height='5' rx='2' fill='#cc785c'/>
  <!-- Ear -->
  <ellipse cx='19' cy='8' rx='2.5' ry='3' fill='#a9583e'/>
  <!-- Eye -->
  <circle cx='16' cy='11.5' r='1.5' fill='#fff'/>
  <circle cx='16.5' cy='11.5' r='0.7' fill='#2a1a0e'/>
  <!-- Snout area -->
  <rect x='2' y='12' width='7' height='5' rx='2.5' fill='#a9583e'/>
  <!-- Nostril -->
  <circle cx='5' cy='14.5' r='0.8' fill='#7a3f26'/>
</svg>