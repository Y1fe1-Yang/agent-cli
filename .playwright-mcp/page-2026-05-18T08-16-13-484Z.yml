            - heading "Navigate to header We Became an AI-Native Team First" [level=3] [ref=e575]:
              - link "Navigate to header" [ref=e576] [cursor=pointer]:
                - /url: "#we-became-an-ai-native-team-first"
                - img [ref=e578]
              - generic [ref=e580] [cursor=pointer]: We Became an AI-Native Team First
            - generic [ref=e581]: "In January 2025, Claude Code launched and transformed how developers write code. Natural language programming improved efficiency several times over. Our team loved using it, but we also wondered:"
            - strong [ref=e583]: Why does AI still have such a high barrier to entry?
            - generic [ref=e584]: To use AI well, you need command line skills, environment setup knowledge, and prompt engineering expertise. Or you’re stuck in chat windows that can’t do much. Why can’t it just work like using a computer?
            - strong [ref=e586]: AI should be egalitarian.
            - generic [ref=e587]: Regardless of profession or background, everyone should equally benefit from AI’s productivity improvements.
            - generic [ref=e588]: So we built a tool for ourselves. Our entire team’s workflow changed. Non-technical team members could write code, create web pages, and process data on their own. Everyone could turn ideas into reality.
            - strong [ref=e590]: Everyone becomes a super individual.
            - generic [ref=e591]: We then commercialized this workflow, creating Happycapy.
            - heading "Navigate to header Why Capybara?" [level=3] [ref=e592]:
              - link "Navigate to header" [ref=e593] [cursor=pointer]:
                - /url: "#why-capybara"
                - img [ref=e595]
              - generic [ref=e597] [cursor=pointer]: Why Capybara?
            - generic [ref=e598]: Capybaras are gentle, friendly creatures that harmoniously coexist with all animals. Online, you’ll find capybaras playing with monkeys, birds, crocodiles, and even dogs and cats.
            - generic [ref=e599]: "That’s exactly what we envisioned: an AI tool that “gets along” with everyone."
            - strong [ref=e601]: Happy + Capybara = Happycapy
            - generic [ref=e602]: We hope that using Happycapy feels like caring for a capybara — chill, anxiety-free, and centered on what truly matters in life.
            - heading "Navigate to header Our Vision" [level=2] [ref=e603]:
              - link "Navigate to header" [ref=e604] [cursor=pointer]:
                - /url: "#our-vision"
                - img [ref=e606]
              - generic [ref=e608] [cursor=pointer]: Our Vision
            - strong [ref=e610]: Let everyone use AI to automate their workflow and reduce repetitive work.
            - strong [ref=e612]: Happycapy, HappyYou.
            - generic [ref=e613]: AI shouldn’t replace people. It should make people more human. Let AI handle repetitive, tedious, time-consuming tasks while you focus on creativity, judgment, and decisions.
            - generic [ref=e614]:
              - text: You focus on
