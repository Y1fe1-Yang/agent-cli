                    - /url: "#vercelnft"
                    - img [ref=e1233]
                - paragraph [ref=e1235]:
                  - text: Some of the Builders use
                  - code [ref=e1236]: "@vercel/nft"
                  - text: "to tree-shake files before deployment. If you suspect an error with this tree-shaking mechanism, you can create the following script in your project:"
                - generic [ref=e1237]:
                  - generic [ref=e1238]: "const { nodeFileTrace } = require('@vercel/nft'); nodeFileTrace(['path/to/entrypoint.js'], { ts: true, mixedModules: true, }) .then(o => console.log(o.fileList)) .then(e => console.error(e));"
                  - button "Copy code to clipboard" [ref=e1240] [cursor=pointer]:
                    - img [ref=e1241]
                - paragraph [ref=e1244]:
                  - text: When you run this script, you'll see all the imported files. If files are missing, the bug is in
                  - link "@vercel/nft" [ref=e1245] [cursor=pointer]:
                    - /url: https://github.com/vercel/nft
                  - text: and not the Builder.
                - generic [ref=e1246]:
                  - heading "Deploy a Builder with existing project" [level=3] [ref=e1247]
