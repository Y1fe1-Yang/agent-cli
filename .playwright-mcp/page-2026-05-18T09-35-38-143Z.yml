                  - button "Copy code to clipboard" [ref=e1219] [cursor=pointer]:
                    - img [ref=e1220]
                - generic [ref=e1223]:
                  - paragraph [ref=e1224]:
                    - img [ref=e1225]
                    - text: Note
                  - paragraph [ref=e1227]:
                    - text: If you receive a
                    - code [ref=e1228]: "401"
                    - text: status code while fetching the deployment, you need to disable
                    - link "Deployment Protection" [ref=e1229] [cursor=pointer]:
