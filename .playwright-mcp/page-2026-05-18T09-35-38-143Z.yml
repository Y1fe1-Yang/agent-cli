                - paragraph [ref=e1251]:
                  - text: Sometimes you want to test changes to a Builder against an existing project, maybe with
                  - code [ref=e1252]: vercel dev
                  - text: or actual deployment. You can avoid publishing every Builder change to npm by uploading the Builder as a tarball.
                - list [ref=e1253]:
                  - listitem [ref=e1254]:
                    - text: Change directory to the desired Builder
                    - code [ref=e1255]: cd ./packages/node
                  - listitem [ref=e1256]:
                    - text: Run
                    - code [ref=e1257]: pnpm build
                    - text: to compile typescript and other build steps
                  - listitem [ref=e1258]:
                    - text: Run
                    - code [ref=e1259]: npm pack
                    - text: to create a tarball file. It is imporant to not use
                    - code [ref=e1260]: pnpm pack
                    - text: because it will not preserve the file permissions
                  - listitem [ref=e1261]: Move the resulting tarball to a directory
                  - listitem [ref=e1262]:
                    - text: Run
                    - code [ref=e1263]: vercel <directory>
                    - text: to upload the tarball file and get a URL. Remember to append
                    - code [ref=e1264]: /<tarball name>
                    - text: to then end of your URL
                  - listitem [ref=e1265]:
                    - text: Edit any existing
                    - code [ref=e1266]: vercel.json
                    - text: project and replace
                    - code [ref=e1267]: use
                    - text: with the URL
                  - listitem [ref=e1268]:
                    - text: Run
                    - code [ref=e1269]: vercel
                    - text: or
