                  - text: In such cases, you can visit the URL of the failed deployment and append
                  - code [ref=e1191]: /_logs
                  - text: to see the build error. In the case above, that would be
                  - link "https://test-8ashcdlew.vercel.app/_logs" [ref=e1192] [cursor=pointer]:
                    - /url: https://test-8ashcdlew.vercel.app/_logs
                - paragraph [ref=e1193]: The logs of this deployment will contain the actual error which may help you to understand what went wrong.
                - generic [ref=e1194]:
                  - heading "Running integration tests locally" [level=5] [ref=e1195]
                  - 'link "Permalink: Running integration tests locally" [ref=e1196] [cursor=pointer]':
                    - /url: "#running-integration-tests-locally"
                    - img [ref=e1197]
                - paragraph [ref=e1199]: "While running the full integration suite locally is not recommended, it's sometimes useful to isolate a failing test by running it on your machine. To do so, you'll need to ensure you have the appropriate credentials sourced in your shell:"
                - list [ref=e1200]:
                  - listitem [ref=e1201]:
                    - text: Create an access token. Follow the instructions here
                    - link "https://vercel.com/docs/rest-api#creating-an-access-token" [ref=e1202] [cursor=pointer]:
                      - /url: https://vercel.com/docs/rest-api#creating-an-access-token
                    - text: . Ensure the token scope is for your personal account.
                  - listitem [ref=e1203]:
                    - text: Grab the team ID from the Vercel dashboard at
                    - code [ref=e1204]: https://vercel.com/<MY-TEAM>/~/settings
                    - text: .
                  - listitem [ref=e1205]:
                    - text: "Source these into your shell rc file:"
                    - code [ref=e1206]: echo 'export VERCEL_TOKEN=<MY-TOKEN> VERCEL_TEAM_ID=<MY-TEAM-ID>' >> ~/.zshrc
                - paragraph [ref=e1207]: "From there, you should be able to trigger an integration test. Choose one that's already isolated to check that things work:"
                - generic [ref=e1208]:
                  - generic [ref=e1209]: cd packages/next
                  - button "Copy code to clipboard" [ref=e1211] [cursor=pointer]:
                    - img [ref=e1212]
                - paragraph [ref=e1215]: "Run the test:"
                - generic [ref=e1216]:
